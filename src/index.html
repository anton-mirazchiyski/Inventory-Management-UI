<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Management UI</title>
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caudex:ital,wght@0,400;0,700;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
  <main>
    <section class="chest">
      <div class="chest-image-container">
        <p class="chest-tooltip hidden-text">Open this chest for a chance of random loot!</p>
        <img src="./assets/images/loot-chest/chest-closed.png" class="chest-closed" alt="closed-chest">
      </div>
      <button type="button" class="chest-open-button">Open Chest</button>
    </section>
    <section class="equipment">
      <h2>Equipment</h2>
      <section class="equipment-slots">
        <div class="head">
          <div class="equipment-slot head-armor-slot"></div>
          <span>Head</span>
        </div>
        <div class="shoulders">
          <div class="equipment-slot shoulders-armor-slot"></div>
          <span>Shoulders</span>
        </div>
        <div class="chest-part">
          <div class="equipment-slot chest-armor-slot"></div>
          <span>Chest</span>
        </div>
        <div class="hands">
          <div class="equipment-slot hands-armor-slot"></div>
          <span>Hands</span>
        </div>
        <div class="legs">
          <div class="equipment-slot legs-armor-slot"></div>
          <span>Legs</span>
        </div>
        <div class="feet">
          <div class="equipment-slot feet-armor-slot"></div>
          <span>Feet</span>
        </div>
        <div class="neck">
          <div class="equipment-slot necklace-slot"></div>
          <span>Neck</span>
        </div>
        <div class="weapon">
          <div class="equipment-slot weapon-slot"></div>
          <span>Weapon</span>
        </div>
      </section>
    </section>
    <section class="inventory">
      <h2>Inventory</h2>
      <section class="inventory-items">
        <ul class="inventory-items-list">
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
          <li class="item-slot empty-slot"></li>
        </ul>
      </section>
    </section>
  </main>
  <script type="module" src="./js/loot-chest.js"></script>
  <script type="module" src="./js/tooltips.js"></script>
  <script type="module" src="./js/inventory.js"></script>
</body>

</html>
